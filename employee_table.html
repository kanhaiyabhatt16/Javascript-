<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Table</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    table {
      width: 700px;
      border-collapse: collapse;
      background: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
    }

    h2 {
      text-align: center;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #007BFF;
      color: white;
    }

    tr:nth-child(even) {
      background: #f2f2f2;
    }

    tr:hover {
      background: #e8f4ff;
    }
  </style>
</head>

<body>

  <div>
    <h2>Employee Details</h2>

    <table>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Department</th>
        <th>Position</th>
        <th>Salary</th>
      </tr>

      <tr>
        <td>101</td>
        <td>Rahul Sharma</td>
        <td>IT</td>
        <td>Software Engineer</td>
        <td>₹60,000</td>
      </tr>

      <tr>
        <td>102</td>
        <td>Priya Singh</td>
        <td>HR</td>
        <td>HR Manager</td>
        <td>₹55,000</td>
      </tr>

      <tr>
        <td>103</td>
        <td>Amit Verma</td>
        <td>Finance</td>
        <td>Accountant</td>
        <td>₹50,000</td>
      </tr>

      <tr>
        <td>104</td>
        <td>Neha Gupta</td>
        <td>Marketing</td>
        <td>Marketing Executive</td>
        <td>₹48,000</td>
      </tr>

      <tr>
        <td>105</td>
        <td>Arjun Mehta</td>
        <td>Sales</td>
        <td>Sales Executive</td>
        <td>₹45,000</td>
      </tr>
    </table>
  </div>

</body>

</html>
