<!DOCTYPE html>
<html>
<head>
    <title>Student Result Form</title>
</head>
<body>

<h2 align="center">Student Result Form</h2>

<form onsubmit="saveData(); return false;">

<table border="1" align="center" cellpadding="8">

<tr>
    <td>Name</td>
    <td><input type="text" id="name" required></td>
</tr>

<tr>
    <td>Roll No</td>
    <td><input type="text" id="roll" required></td>
</tr>

<tr>
    <td>English</td>
    <td><input type="number" id="eng" max="100" min="0" required></td>
</tr>

<tr>
    <td>Maths</td>
    <td><input type="number" id="math" max="100" min="0" required></td>
</tr>

<tr>
    <td>Science</td>
    <td><input type="number" id="sci" max="100" min="0" required></td>
</tr>

<tr>
    <td>Computer</td>
    <td><input type="number" id="comp" max="100" min="0" required></td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Show Result">
    </td>
</tr>

</table>

</form>

<script>

function saveData(){

let name=document.getElementById("name").value;
let roll=document.getElementById("roll").value;

let eng=Number(document.getElementById("eng").value);
let math=Number(document.getElementById("math").value);
let sci=Number(document.getElementById("sci").value);
let comp=Number(document.getElementById("comp").value);

let total=eng+math+sci+comp;
let per=total/4;

let grade="";
let result="PASS";

if(eng<33||math<33||sci<33||comp<33){
    result="FAIL";
}

if(per>=90)
grade="A+";
else if(per>=80)
grade="A";
else if(per>=70)
grade="B";
else if(per>=60)
grade="C";
else if(per>=50)
grade="D";
else
grade="F";

localStorage.setItem("name",name);
localStorage.setItem("roll",roll);

localStorage.setItem("eng",eng);
localStorage.setItem("math",math);
localStorage.setItem("sci",sci);
localStorage.setItem("comp",comp);

localStorage.setItem("total",total);
localStorage.setItem("per",per.toFixed(2));
localStorage.setItem("grade",grade);
localStorage.setItem("result",result);

window.location="result.html";

}

</script>

</body>
</html>
