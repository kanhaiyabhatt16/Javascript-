<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Calculator Using Table</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        table{
            border-collapse:collapse;
            background:#333;
            padding:10px;
            border-radius:10px;
        }

        input{
            width:98%;
            height:50px;
            font-size:22px;
            text-align:right;
            border:none;
            outline:none;
            padding-right:10px;
        }

        button{
            width:60px;
            height:60px;
            font-size:20px;
            cursor:pointer;
            border:none;
            background:#444;
            color:white;
        }

        button:hover{
            background:#666;
        }

        .equal{
            background:green;
        }

        .clear{
            background:red;
        }
    </style>
</head>
<body>

<table border="1">
    <tr>
        <td colspan="4">
            <input type="text" id="display" readonly>
        </td>
    </tr>

    <tr>
        <td><button onclick="clearDisplay()" class="clear">C</button></td>
        <td><button onclick="deleteLast()">←</button></td>
        <td><button onclick="append('%')">%</button></td>
        <td><button onclick="append('/')">/</button></td>
    </tr>

    <tr>
        <td><button onclick="append('7')">7</button></td>
        <td><button onclick="append('8')">8</button></td>
        <td><button onclick="append('9')">9</button></td>
        <td><button onclick="append('*')">*</button></td>
    </tr>

    <tr>
        <td><button onclick="append('4')">4</button></td>
        <td><button onclick="append('5')">5</button></td>
        <td><button onclick="append('6')">6</button></td>
        <td><button onclick="append('-')">-</button></td>
    </tr>

    <tr>
        <td><button onclick="append('1')">1</button></td>
        <td><button onclick="append('2')">2</button></td>
        <td><button onclick="append('3')">3</button></td>
        <td><button onclick="append('+')">+</button></td>
    </tr>

    <tr>
        <td><button onclick="append('0')">0</button></td>
        <td><button onclick="append('.')">.</button></td>
        <td><button onclick="calculate()" class="equal">=</button></td>
        <td><button onclick="append('00')">00</button></td>
    </tr>
</table>

<script>
    let display = document.getElementById("display");

    function append(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function deleteLast(){
        display.value = display.value.slice(0, -1);
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
